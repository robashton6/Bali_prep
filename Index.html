// ── STORAGE SHIM (localStorage instead of window.storage) ──────────────────
window.storage = {
  get: async (key) => {
    try {
      const val = localStorage.getItem(key);
      return val ? { key, value: val } : null;
    } catch(e) { return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem(key, value);
      return { key, value };
    } catch(e) { return null; }
  },
  delete: async (key) => {
    try { localStorage.removeItem(key); return { key, deleted:true }; } catch(e) { return null; }
  },
  list: async (prefix) => {
    try {
      const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
      return { keys };
    } catch(e) { return { keys:[] }; }
  }
};

// ── WEEK STRUCTURE ────────────────────────────────────────────────────────────
// 4 weeks × 7 days = 28 days + 2 extra = 30 days
// Mon=Run, Tue=Upper, Wed=Lower, Thu=Rest, Fri=Full Body, Sat=Conditioning, Sun=Rest

const DAY_TYPES = {
  1:'run', 2:'upper', 3:'lower', 4:'rest',
  5:'fullbody', 6:'conditioning', 7:'rest',
};

function getDayType(day) {
  return DAY_TYPES[((day - 1) % 7) + 1];
}

function getWeek(day) { return Math.ceil(day / 7); }
function getDayOfWeek(day) { return ((day - 1) % 7) + 1; }

const DAY_NAMES = {
  run:'Monday — Run Day', upper:'Tuesday — Upper Body',
  lower:'Wednesday — Lower Body', rest:'Rest Day',
  fullbody:'Friday — Full Body', conditioning:'Saturday — Conditioning',
};

// ── STORAGE ───────────────────────────────────────────────────────────────────
const SK = 'maintain30_v2';
async function loadData() {
  try { const r = await window.storage.get(SK); return r ? JSON.parse(r.value) : {}; }
  catch { return {}; }
}
async function saveData(d) {
  try { await window.storage.set(SK, JSON.stringify(d)); } catch {}
}

// ── FORECAST ENGINE ───────────────────────────────────────────────────────────
// For a given exercise on a given day, find the same exercise from the equivalent
// day in the PREVIOUS week and return that weight as the "last week" value.
function getLastWeekWeight(exId, day, weights) {
  const prevDay = day - 7;
  if (prevDay < 1) return null;
  const key = `d${prevDay}_${exId}`;
  const val = weights?.[key];
  return val && !isNaN(parseFloat(val)) ? parseFloat(val) : null;
}

function getProjection(exId, currentVal, unit, day, weights) {
  const last = getLastWeekWeight(exId, day, weights);
  const cur = currentVal ? parseFloat(currentVal) : null;

  if (unit !== 'kg') return null;

  // If we have last week's weight, show it as target + project from current
  if (last !== null && cur === null) {
    // Not yet logged this week — show last week as minimum target
    return { type:'target', text:`Last week: ${last} kg — aim to beat this` };
  }
  if (last !== null && cur !== null) {
    const diff = cur - last;
    const next = cur + 2.5;
    const diffText = diff > 0 ? `+${diff.toFixed(1)} kg on last week` : diff < 0 ? `${diff.toFixed(1)} kg on last week` : 'matched last week';
    return { type:'progress', text:`${diffText} · Next week → ${next.toFixed(1)} kg` };
  }
  if (cur !== null) {
    return { type:'next', text:`Next week → ${(cur + 2.5).toFixed(1)} kg` };
  }
  return null;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function SectionLabel({ text, color }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, marginTop:4 }}>
      <span style={{ fontSize:9, letterSpacing:2, textTransform:'uppercase', color, flexShrink:0 }}>{text}</span>
      <div style={{ flex:1, height:1, background:C.border }} />
    </div>
  );
}

function ExRow({ dayKey, ex, accent, data, onCheck, onWeight, showForecast }) {
  const [id, name, sets, unit] = ex;
  const key = `${dayKey}_${id}`;
  const checked = !!data.checked?.[key];
  const weight = data.weights?.[key] || '';
  const forecast = showForecast && unit === 'kg'
    ? getProjection(id, weight || null, unit, parseInt(dayKey.replace('d','')), data.weights)
    : null;

  const fColor = forecast?.type === 'progress'
    ? (weight && parseFloat(weight) > (getLastWeekWeight(id, parseInt(dayKey.replace('d','')), data.weights)||0) ? C.greenLt : C.mealLt)
    : C.gold;

  return (
    <div style={{ display:'grid', gridTemplateColumns:'22px 1fr auto', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.surface3}`, alignItems:'start' }}>
      <button onClick={() => onCheck(key)}
        style={{ width:20, height:20, border:`1.5px solid ${checked?accent:C.border}`, borderRadius:2, background:checked?accent:'none', color:checked?'white':'transparent', fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2 }}>
        ✓
      </button>
      <div style={{ minWidth:0 }}>
        <div style={{ fontSize:12, fontWeight:500, color:checked?C.muted:C.white, textDecoration:checked?'line-through':'none', lineHeight:1.4, marginBottom:2 }}>{name}</div>
        {sets && <div style={{ fontSize:10, color:C.muted, fontStyle:'italic' }}>{sets}</div>}
        {forecast && <div style={{ fontSize:9, color:fColor, marginTop:3, lineHeight:1.4 }}>{forecast.text}</div>}
      </div>
      {unit === 'kg' ? (
        <input type="number" step="0.5" min="0" placeholder="kg"
          value={weight}
          onChange={e => onWeight(key, e.target.value)}
          style={{ width:72, background:C.surface2, border:`1px solid ${C.border}`, color:C.white, fontFamily:'inherit', fontSize:11, padding:'4px 7px', outline:'none', textAlign:'right' }} />
      ) : <div style={{width:72}} />}
    </div>
  );
}

function MealRow({ dayKey, meal, data, onCheck }) {
  const key = `${dayKey}_${meal.id}`;
  const checked = !!data.checked?.[key];
  return (
    <div style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'8px 0', borderBottom:`1px solid ${C.surface3}` }}>
      <button onClick={() => onCheck(key)}
        style={{ width:20, height:20, border:`1.5px solid ${C.meal}`, borderRadius:2, background:checked?C.meal:'none', color:checked?'white':'transparent', fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2 }}>
        ✓
      </button>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:8, flexWrap:'wrap' }}>
          <span style={{ fontSize:9, letterSpacing:1, textTransform:'uppercase', color:C.mealLt, flexShrink:0 }}>{meal.label}</span>
          <span style={{ fontSize:12, fontWeight:500, color:checked?C.muted:C.white, textDecoration:checked?'line-through':'none' }}>{meal.name}</span>
        </div>
        <div style={{ fontSize:10, color:C.muted, marginTop:2, lineHeight:1.5 }}>{meal.detail}</div>
      </div>
      <div style={{ fontSize:10, color:C.mealLt, flexShrink:0, textAlign:'right', minWidth:60 }}>{meal.cal}</div>
    </div>
  );
}

function DayCard({ day, data, onCheck, onWeight, onComment, onDone }) {
  const [open, setOpen] = useState(false);
  const workout = getWorkout(day);
  const type = getDayType(day);
  const week = getWeek(day);
  const isRest = type === 'rest';
  const isDone = !!data.dayDone?.[day];

  const jaw = getJaw(week);
  const meals = getMeals(day);
  const comment = data.comments?.[day] || '';

  const typeColor = {
    run:C.runLt, upper:C.oceanLt, lower:C.greenLt,
    rest:C.muted, fullbody:C.goldLt, conditioning:C.mealLt

  return (
    <div style={{ background:C.surface, border:`1px solid ${isDone?'rgba(26,107,138,0.4)':C.border}`, marginBottom:8 }}>

        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:13, fontWeight:500, marginBottom:4, color:typeColor }}>{workout.title}</div>
          <div style={{ fontSize:9, color:C.muted, letterSpacing:0.5 }}>Week {week} · {isRest ? 'Rest & Recover' : type === 'run' ? 'Cardio + Plyos' : 'Strength'}</div>
        </div>
        <div style={{ fontSize:11, color:C.muted, transform:open?'rotate(180deg)':'none', transition:'transform .2s' }}>▼</div>
      </div>

      {open && (
        <div style={{ borderTop:`1px solid ${C.border}` }}>

          {/* Roman Chair Warmup — non-rest days */}
          {!isRest && (
            <div style={{ padding:'14px 14px', borderBottom:`1px solid ${C.surface3}` }}>
              <SectionLabel text="Roman Chair Warm-Up" color={C.goldLt} />

                <ExRow key={i} dayKey={dayKey} ex={[ex.id, ex.name, ex.sets, ex.unit]} accent={C.gold} data={data} onCheck={onCheck} onWeight={onWeight} showForecast={false} />
              ))}
            </div>

            <SectionLabel text={isRest ? 'Active Recovery' : 'Workout'} color={typeColor} />

            </div>

              <ExRow key={i} dayKey={dayKey} ex={[ex.id, ex.name, ex.sets, '']} accent={C.jaw} data={data} onCheck={onCheck} onWeight={onWeight} showForecast={false} />

              <strong style={{ color:C.jawLt, fontStyle:'normal', fontSize:9, letterSpacing:1, textTransform:'uppercase' }}>Jaw</strong><br/>

          {/* Comments */}
          <div style={{ padding:'14px 14px', borderBottom:`1px solid ${C.surface3}` }}>
            <SectionLabel text="Notes & Comments" color={C.muted} />
            <textarea value={comment} onChange={e => onComment(day, e.target.value)}
              placeholder="How did it go? Weights hit, energy levels, anything to carry forward..."
              rows={3}
              style={{ width:'100%', background:C.surface2, border:`1px solid ${C.border}`, color:C.white, fontFamily:'inherit', fontSize:12, lineHeight:1.6, padding:'9px 11px', outline:'none', resize:'vertical' }} />
          </div>

          {/* Complete */}
          <button onClick={() => onDone(day)}
            style={{ width:'100%', padding:11, background:isDone?C.oceanDim:'transparent', border:'none', borderTop:`1px solid ${C.border}`, color:isDone?C.oceanLt:C.muted, fontFamily:'inherit', fontSize:10, letterSpacing:2, textTransform:'uppercase', cursor:'pointer' }}>
            {isDone ? '✓ Day Complete' : 'Mark Day Complete'}
          </button>
        </div>
      )}
    </div>
  );
}

// ── RECIPE CARD ───────────────────────────────────────────────────────────────
function RecipeCard() {
  return (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, padding:16, marginBottom:10 }}>
      <div style={{ fontFamily:'Georgia,serif', fontSize:17, color:C.mealLt, marginBottom:10 }}>Egg Fried Rice — Lunch Recipe</div>
      <div style={{ fontSize:12, color:C.muted, lineHeight:1.8 }}>
        <strong style={{ color:C.white }}>Ingredients (1 serve):</strong><br/>
        • ¾ cup cooked rice (day-old is best — less soggy)<br/>
        • 3 eggs<br/>
        • 1 large handful frozen mixed veg (straight from bag)<br/>
        • 1 tbsp soy sauce<br/>
        • 1 tsp sesame oil<br/>
        • 2 cloves garlic, minced (or ½ tsp garlic powder)<br/>
        • Spring onion to finish (optional)<br/><br/>
        <strong style={{ color:C.white }}>Method (8 min):</strong><br/>
        1. Heat pan on high with a little oil<br/>
        2. Add frozen veg straight in — stir fry 2 min<br/>
        3. Push to side, crack eggs in, scramble<br/>
        4. Add rice, mix everything together<br/>
        5. Add garlic, soy sauce, sesame oil — toss 2 min<br/>
        6. Top with spring onion and serve<br/><br/>
        <strong style={{ color:C.mealLt }}>~520 cal · 28g protein · 55g carb · 14g fat</strong><br/><br/>
        <em>Batch tip: Cook a big pot of rice Sunday. Portion into containers. Takes 8 min per serve from there.</em>
      </div>
    </div>
  );
}

// ── GUIDE ─────────────────────────────────────────────────────────────────────
function Guide() {
  const cards = [
    { title:'How Forecasting Works', color:C.oceanLt, body:`When you log a weight for any kg-based exercise, the app remembers it. The following week, on the same exercise, it shows you what you lifted last week as your minimum target. Once you log this week's weight, it shows the difference and projects next week's target (+2.5 kg). Green means you beat last week. Orange means you matched or dropped. This replaces having to go back through old sessions manually.` },
    { title:'Weekly Structure', color:C.goldLt, body:`Monday — Run + Plyos. Build cardio base and explosive power.\nTuesday — Upper Body. Chest, shoulders, back, arms.\nWednesday — Lower Body. Squats, hinge, glutes, hamstrings.\nThursday — Rest. Back mobility and jaw work still happen.\nFriday — Full Body. Compound supersets for strength and fat burn.\nSaturday — Conditioning. Row erg, KB, sprints, plyos.\nSunday — Rest. Walk, stretch, recover.` },
    { title:'Roman Chair Warm-Up', color:C.gold, body:`Every training day starts with 3 Roman chair exercises before anything else. Back extensions build the erector spinae which directly supports your scoliosis curve. Side bends and isometric holds train the muscles that resist lateral deviation. Keep these controlled — this is not a power exercise, it's targeted back strengthening.` },
    { title:'Back Mobility — S-Curve Notes', color:C.backLt, body:`Your lumbar curves LEFT and thoracic curves RIGHT with a left rib hump.\n\nSide bend stretch RIGHT only — this opens the compressed left lumbar side. Never stretch left — it's already the long side and reinforces the curve.\n\nThread the needle LEFT arm bias — rotates thoracic spine in the direction that counteracts your right thoracic curve.\n\nLeft side rib breathing — lie on your left side, breathe deep, let the left ribs sink on exhale. This is actual clinical scoliosis management.\n\nDead hang decompresses the lumbar spine passively — do it before and after every lifting session.` },
    { title:'Progressive Overload', color:C.greenLt, body:`Hit all reps with good form → add 2.5 kg next session. Miss reps → hold the weight. The forecasting engine handles the tracking — you just log what you lift and the app tells you what to aim for next week.` },
    { title:'Nutrition Summary', color:C.mealLt, body:`Coffee + overnight oats + yogurt to start. Egg fried rice with frozen veg for lunch. Fruit snacks through the day. Protein + potato + veg for dinner. 3L water daily.\n\nOn training days: add extra fruit or a banana pre/post workout.\nOn rest days: skip the afternoon snack.\nTaco bowl swap: 150g pork mince (cooked = ~115g) + El Toro seasoning + rice + 30g cheese + 1 flour tortilla ≈ 620 cal / 38g protein.` },
  ];

  return (
    <div>
      <div style={{ marginBottom:18, paddingBottom:12, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontFamily:'Georgia,serif', fontSize:28, color:C.muted, letterSpacing:1 }}>GUIDE</div>
      </div>
      <RecipeCard />
      {cards.map((c,i) => (
        <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`, padding:16, marginBottom:10 }}>
          <div style={{ fontFamily:'Georgia,serif', fontSize:17, color:c.color, marginBottom:8 }}>{c.title}</div>
          <div style={{ fontSize:12, color:C.muted, lineHeight:1.8, whiteSpace:'pre-line' }}>{c.body}</div>
        </div>
      ))}
    </div>
  );
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function Stats({ data }) {
  const done = Object.values(data.dayDone||{}).filter(Boolean).length;
  const exChecked = Object.values(data.checked||{}).filter(Boolean).length;
  const weights = data.weights || {};

  const heaviest = (keyword) => {
    const vals = Object.entries(weights)
      .filter(([k]) => k.includes(keyword))
      .map(([,v]) => parseFloat(v)||0);
    return vals.length ? Math.max(...vals) : null;
  };

  const dl = heaviest('dead') || heaviest('lo_dead');
  const bench = heaviest('bench') || heaviest('up_bench');
  const squat = heaviest('squat') || heaviest('lo_squat');

  const StatBox = ({ val, label }) => (
    <div style={{ background:C.surface, border:`1px solid ${C.border}`, padding:16, textAlign:'center' }}>
      <div style={{ fontFamily:'Georgia,serif', fontSize:34, color:C.oceanLt, lineHeight:1 }}>{val}</div>
      <div style={{ fontSize:9, letterSpacing:2, textTransform:'uppercase', color:C.muted, marginTop:6 }}>{label}</div>
    </div>
  );

  return (
    <div>
      <div style={{ marginBottom:18, paddingBottom:12, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ fontFamily:'Georgia,serif', fontSize:28, color:C.muted, letterSpacing:1 }}>YOUR STATS</div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10 }}>
        <StatBox val={done} label="Days Complete" />
        <StatBox val={30-done} label="Days Remaining" />
        <StatBox val={exChecked} label="Exercises Logged" />
        <StatBox val={`${Math.round((done/30)*100)}%`} label="Program Complete" />
      </div>
      {(dl||bench||squat) && (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:10 }}>
          {dl    && <StatBox val={`${dl}kg`}    label="Best Deadlift" />}
          {bench && <StatBox val={`${bench}kg`} label="Best Bench" />}
          {squat && <StatBox val={`${squat}kg`} label="Best Squat" />}
        </div>
      )}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, padding:16 }}>
        <div style={{ fontSize:12, color:C.muted, lineHeight:1.8 }}>
          <strong style={{ color:C.white }}>Week-on-Week Tracking</strong><br/>
          Every kg-based exercise shows last week's weight as your target when you open a new week. After you log this week, it shows your improvement and projects next week automatically. No need to scroll back through old sessions.
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const WEEKS = [
  { label:'Week 1', days:[1,2,3,4,5,6,7]   },
  { label:'Week 2', days:[8,9,10,11,12,13,14] },
  { label:'Week 3', days:[15,16,17,18,19,20,21] },
  { label:'Week 4', days:[22,23,24,25,26,27,28] },
  { label:'+ Days', days:[29,30] },
];
const EXTRA_TABS = ['Guide','Stats'];

function App() {
  const [data, setData] = useState({});
  const [tab, setTab] = useState(0);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => { loadData().then(d => { setData(d); setLoaded(true); }); }, []);

  const onCheck = useCallback((key) => {
    setData(prev => { const n={...prev,checked:{...prev.checked,[key]:!prev.checked?.[key]}}; saveData(n); return n; });
  },[]);
  const onWeight = useCallback((key, val) => {
    setData(prev => { const n={...prev,weights:{...prev.weights,[key]:val}}; saveData(n); return n; });
  },[]);
  const onComment = useCallback((day, val) => {
    setData(prev => { const n={...prev,comments:{...prev.comments,[day]:val}}; saveData(n); return n; });
  },[]);
  const onDone = useCallback((day) => {
    setData(prev => { const n={...prev,dayDone:{...prev.dayDone,[day]:!prev.dayDone?.[day]}}; saveData(n); return n; });
  },[]);

  const totalDone = Object.values(data.dayDone||{}).filter(Boolean).length;
  const pct = Math.round((totalDone/30)*100);

  const allTabs = [
    ...WEEKS.map((w,i) => {
      const done = w.days.filter(d => data.dayDone?.[d]).length;
      return { label: w.label, sub: done > 0 ? `${done}/${w.days.length}` : null };
    }),
    ...EXTRA_TABS.map(l => ({ label:l, sub:null })),
  ];

  if (!loaded) return (
    <div style={{ background:C.black, color:C.muted, minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'sans-serif' }}>
      Loading…
    </div>
  );

  const weekIdx = tab < WEEKS.length ? tab : null;
  const extraIdx = tab >= WEEKS.length ? tab - WEEKS.length : null;

  return (
    <div style={{ background:C.black, color:C.white, minHeight:'100vh', fontFamily:"'DM Sans',system-ui,sans-serif", fontSize:14 }}>
      {/* Hero */}
      <div style={{ padding:'36px 18px 24px', textAlign:'center', borderBottom:`1px solid ${C.border}`, background:'linear-gradient(180deg,#111 0%,#080808 100%)' }}>
        <div style={{ display:'inline-block', fontSize:9, letterSpacing:3, textTransform:'uppercase', color:C.gold, border:`1px solid rgba(201,168,76,0.35)`, padding:'5px 13px', marginBottom:14 }}>30 Day Maintenance Program</div>
        <div style={{ fontFamily:'Georgia,serif', fontSize:54, lineHeight:0.9, letterSpacing:1, marginBottom:4 }}>
          STAY<span style={{ color:C.oceanLt }}>SHARP</span>
        </div>
        <div style={{ fontSize:11, color:C.muted, marginTop:12, lineHeight:1.6 }}>Strength · Run · Conditioning · Back Health · Jaw · Nutrition</div>
      </div>

      {/* Progress */}
      <div style={{ padding:'14px 18px 0', maxWidth:860, margin:'0 auto' }}>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:7 }}>
          <span style={{ fontSize:9, letterSpacing:2, textTransform:'uppercase', color:C.muted }}>Overall Progress</span>
          <span style={{ fontFamily:'Georgia,serif', fontSize:18, color:C.gold }}>{totalDone} / 30 Days</span>
        </div>
        <div style={{ height:3, background:C.border, borderRadius:2, overflow:'hidden', marginBottom:14 }}>
          <div style={{ height:'100%', width:`${pct}%`, background:`linear-gradient(90deg,${C.ocean},${C.gold})`, transition:'width .5s' }} />
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', overflowX:'auto', borderBottom:`1px solid ${C.border}`, background:C.surface, position:'sticky', top:0, zIndex:50 }}>
        {allTabs.map((t,i) => (
          <div key={i} onClick={() => setTab(i)}
            style={{ flex:'0 0 auto', padding:'11px 14px', fontSize:10, letterSpacing:1.5, textTransform:'uppercase', color:tab===i?C.oceanLt:C.muted, borderBottom:`2px solid ${tab===i?C.oceanLt:'transparent'}`, cursor:'pointer', whiteSpace:'nowrap', transition:'all .2s' }}>
            {t.label}{t.sub && <span style={{ marginLeft:4, fontSize:9, color:C.gold }}>{t.sub}</span>}
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth:860, margin:'0 auto', padding:18 }}>
        {weekIdx !== null && (
          <>
            <div style={{ marginBottom:16, paddingBottom:12, borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontFamily:'Georgia,serif', fontSize:26, color:C.oceanLt, letterSpacing:1 }}>WEEK {weekIdx+1}</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>
                {weekIdx === 0 && 'Establish baseline weights. Log everything — this seeds all future forecasts.'}
                {weekIdx === 1 && 'Week 2 targets auto-populate from your Week 1 logs. Aim to beat every number.'}
                {weekIdx === 2 && 'Volume increases. Sets go to 4. The forecasting shows your Week 2 weights as targets.'}
                {weekIdx === 3 && 'Peak week. Heavier, more reps. Your full 4-week progression shows in every exercise.'}
                {weekIdx === 4 && 'Final 2 days. Finish strong.'}
              </div>
            </div>
            {WEEKS[weekIdx].days.map(day => (
              <DayCard key={day} day={day} data={data} onCheck={onCheck} onWeight={onWeight} onComment={onComment} onDone={onDone} />
            ))}
          </>
        )}
        {extraIdx === 0 && <Guide />}
        {extraIdx === 1 && <Stats data={data} />}
      </div>

      <div style={{ textAlign:'center', padding:'24px 18px', fontSize:9, letterSpacing:2, textTransform:'uppercase', color:C.muted2, borderTop:`1px solid ${C.border}` }}>
        Stay Sharp · 30 Days · Week-on-week forecasting · Data saves automatically
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
